# =============================================================================
# Zephyr Project Configuration — HCE Peripheral Drivers
# Board: NUCLEO-F446RE (STM32F446RE)
# Base Configurations (Common Options)
# =============================================================================

# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_FPU=y
CONFIG_REQUIRES_FLOAT_PRINTF=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# UART / Serial Base Console & Logging
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y

# Timing / Kernel
CONFIG_COUNTER=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Stack / heap sizes
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

CONFIG_ASSERT=y