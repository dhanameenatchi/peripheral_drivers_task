# =============================================================================
# Zephyr Project Configuration — HCE Peripheral Drivers
# Board: NUCLEO-F446RE (STM32F446RE)
# GPIO MODULE ONLY BUILD
# =============================================================================
# =============================================================================
# Zephyr Project Configuration — HCE Peripheral Drivers
# Board: NUCLEO-F446RE (STM32F446RE)
# GPIO MODULE ONLY BUILD — Zephyr 4.x compatible
# =============================================================================

# ── C++ support ───────────────────────────────────────────────────────────────
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_FPU=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

# ── I2C ───────────────────────────────────────────────────────────────────────
CONFIG_I2C=y
CONFIG_I2C_INIT_PRIORITY=60

# ── GPIO ──────────────────────────────────────────────────────────────────────
CONFIG_GPIO=y

# ── UART / Serial (for LOG output) ────────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y

# ── Timing / Kernel (needed for k_timer debounce) ─────────────────────────────
CONFIG_COUNTER=y
# CONFIG_SYSTEM_CLOCK_SYCLK_SRC_PLL=y

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── Stack / heap sizes ────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_ASSERT=y